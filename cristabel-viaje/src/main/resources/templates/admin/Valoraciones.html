<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Valoraciones</title>
    <th:block th:replace="~{fragments/head :: head}"></th:block>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="contenedor">
    <h1>Gestión de Valoraciones</h1>

    <div th:if="${#lists.isEmpty(valoraciones)}">
        <p>No hay valoraciones registradas.</p>
    </div>

    <div th:each="valoracion : ${valoraciones}"
         style="background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px;">

        <p><strong>Producto:</strong> <span th:text="${valoracion.producto.nombre}"></span></p>
        <p><strong>Usuario:</strong> <span th:text="${valoracion.usuario.nombre}"></span></p>

        <div style="font-size: 1.2rem; color: #FFC107; margin-bottom: 10px;">
            <span th:text="${valoracion.puntuacion >= 1 ? '★' : '☆'}"></span>
            <span th:text="${valoracion.puntuacion >= 2 ? '★' : '☆'}"></span>
            <span th:text="${valoracion.puntuacion >= 3 ? '★' : '☆'}"></span>
            <span th:text="${valoracion.puntuacion >= 4 ? '★' : '☆'}"></span>
            <span th:text="${valoracion.puntuacion >= 5 ? '★' : '☆'}"></span>
        </div>

        <p th:text="${valoracion.comentario}"></p>

        <small style="color: #777;"
               th:text="${#temporals.format(valoracion.fecha, 'dd/MM/yyyy HH:mm')}"></small>

        <div th:if="${valoracion.respuestaAdmin != null and !#strings.isEmpty(valoracion.respuestaAdmin)}"
             style="margin-top: 15px; background: #f8f9fa; border-left: 4px solid #2E7D32; padding: 15px; border-radius: 6px;">
            <p style="margin-bottom: 8px;"><strong>Respuesta del administrador:</strong></p>
            <p th:text="${valoracion.respuestaAdmin}"></p>
            <small style="color: #777;"
                   th:text="${valoracion.fechaRespuesta != null ? #temporals.format(valoracion.fechaRespuesta, 'dd/MM/yyyy HH:mm') : ''}"></small>
        </div>

        <form th:action="@{/admin/valoraciones/responder}" method="post" style="margin-top: 20px;">
            <input type="hidden" name="id" th:value="${valoracion.id}">

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 6px; font-weight: 600;">Respuesta del admin</label>
                <textarea name="respuestaAdmin" rows="4" style="width: 100%;"
                          th:text="${valoracion.respuestaAdmin}"></textarea>
            </div>

            <button type="submit" class="btn-admin">Guardar respuesta</button>
        </form>
    </div>

    <p style="margin-top: 30px;">
        <a href="/" class="volver">← Volver a la tienda</a>
    </p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
