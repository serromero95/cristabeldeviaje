<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <th:block th:replace="~{fragments/head :: head}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="contenedor">
    <div class="caja-blanca sombra-suave" style="max-width: 700px; margin: 40px auto;">

        <h1 style="margin-bottom: 25px;"
            th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}"></h1>

        <form th:action="@{/admin/productos/save}"
              th:object="${producto}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">

            <div style="margin-bottom: 15px;">
                <label>Nombre del Producto:</label>
                <input type="text" th:field="*{nombre}" required style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Descripción:</label>
                <textarea th:field="*{descripcion}" rows="4" style="width: 100%;"></textarea>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label>Precio (€):</label>
                    <input type="number" step="0.01" th:field="*{precio}" required style="width: 100%;">
                </div>

                <div style="flex: 1;">
                    <label>Stock:</label>
                    <input type="number" th:field="*{stock}" required style="width: 100%;">
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label>Tallas disponibles (separadas por comas):</label>
                <input type="text" th:field="*{tallas}" placeholder="Ej: S,M,L,XL" style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Colores disponibles (separados por comas):</label>
                <input type="text" th:field="*{colores}" placeholder="Ej: Negro,Verde,Azul" style="width: 100%;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Categoría:</label>
                <select th:field="*{categoria}" required style="width: 100%;">
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}">
                    </option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Subir imagen:</label>
                <input type="file" name="archivoImagen" accept="image/*" style="width: 100%;">

                <p th:if="${producto.imagen != null and !#strings.isEmpty(producto.imagen)}"
                   style="margin-top: 10px; font-size: 0.95rem; color: #666;">
                    Imagen actual: <span th:text="${producto.imagen}"></span>
                </p>
            </div>

            <button type="submit" class="btn-admin" style="width: 100%;">
                Guardar Producto
            </button>

            <p style="text-align: center; margin-top: 20px;">
                <a th:href="@{/admin/productos}" class="btn-outline-secondary">
                    Cancelar
                </a>
            </p>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
