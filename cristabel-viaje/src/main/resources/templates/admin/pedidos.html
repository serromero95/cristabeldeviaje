<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pedidos</title>
    <th:block th:replace="~{fragments/head :: head}"></th:block>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="contenedor">
    <h1>Gestión de Pedidos</h1>

    <div th:if="${#lists.isEmpty(pedidos)}">
        <p>No hay pedidos registrados.</p>
    </div>

    <div th:if="${not #lists.isEmpty(pedidos)}" th:each="p : ${pedidos}"
         style="border: 1px solid #ddd; padding: 20px; margin-top: 20px; border-radius: 8px; background-color: #fff;">

        <h3 style="margin-top: 0;">Pedido #<span th:text="${p.id}"></span></h3>

        <p><strong>Usuario:</strong> <span th:text="${p.usuario.email}"></span></p>
        <p><strong>Fecha:</strong> <span th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy HH:mm')}"></span></p>
        <p><strong>Total:</strong> <span th:text="${#numbers.formatDecimal(p.total, 1, 2) + ' €'}"></span></p>

        <p>
            <strong>Estado actual:</strong>
            <span th:text="${p.estado}"
                  th:style="${p.estado == 'pendiente' ? 'color: orange; font-weight: bold;' :
                            (p.estado == 'enviado' ? 'color: blue; font-weight: bold;' :
                            'color: green; font-weight: bold;')}">
            </span>
        </p>

        <form th:action="@{/admin/pedidos/estado}" method="post" style="margin: 20px 0; display: flex; gap: 10px; align-items: center;">
            <input type="hidden" name="id" th:value="${p.id}">

            <select name="estado" style="max-width: 200px;">
                <option value="pendiente" th:selected="${p.estado == 'pendiente'}">Pendiente</option>
                <option value="enviado" th:selected="${p.estado == 'enviado'}">Enviado</option>
                <option value="entregado" th:selected="${p.estado == 'entregado'}">Entregado</option>
            </select>

            <button type="submit" class="btn-admin">Guardar estado</button>
        </form>

        <h4>Productos del pedido</h4>

        <table style="width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left;">
            <thead>
            <tr>
                <th style="padding: 10px;">Producto</th>
                <th>Opciones</th>
                <th>Cantidad</th>
                <th>Precio unitario</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detalle : ${p.detalles}">
                <td style="padding: 10px;" th:text="${detalle.producto.nombre}"></td>
                <td>
                    <div th:if="${detalle.talla != null and !#strings.isEmpty(detalle.talla)}">
                        <strong>Talla:</strong> <span th:text="${detalle.talla}"></span>
                    </div>
                    <div th:if="${detalle.color != null and !#strings.isEmpty(detalle.color)}">
                        <strong>Color:</strong> <span th:text="${detalle.color}"></span>
                    </div>
                    <div th:if="${(detalle.talla == null or #strings.isEmpty(detalle.talla)) and (detalle.color == null or #strings.isEmpty(detalle.color))}">
                        Sin opciones
                    </div>
                </td>
                <td th:text="${detalle.cantidad}"></td>
                <td th:text="${#numbers.formatDecimal(detalle.precio, 1, 2) + ' €'}"></td>
                <td th:text="${#numbers.formatDecimal(detalle.precio * detalle.cantidad, 1, 2) + ' €'}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <p style="margin-top: 30px;">
        <a href="/" class="volver">← Volver a la tienda</a>
    </p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
