<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.nombre} + ' - Cristabel de Viaje'"></title>
    <th:block th:replace="~{fragments/head :: head}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container producto-detalle">
    <div class="row">
        <div class="col-md-6 text-center">
            <img th:src="@{'/img/' + ${producto.imagen}}" class="img-fluid img-detalle shadow" th:alt="${producto.nombre}">
        </div>

        <div class="col-md-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/">Tienda</a></li>
                    <li class="breadcrumb-item active" th:text="${producto.categoria.nombre}">Categoría</li>
                </ol>
            </nav>

            <h1 class="display-4 fw-bold" th:text="${producto.nombre}">Nombre</h1>
            <p class="lead mt-3" th:text="${producto.descripcion}">Descripción</p>

            <div class="my-4">
                <h2 class="precio-grande fw-bold" th:text="${#numbers.formatDecimal(producto.precio, 1, 2) + ' €'}">0.00 €</h2>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="font-size: 1.4rem; color: #FFC107; margin-bottom: 5px;">
                    <span th:text="${mediaValoracion >= 1 ? '★' : '☆'}"></span>
                    <span th:text="${mediaValoracion >= 2 ? '★' : '☆'}"></span>
                    <span th:text="${mediaValoracion >= 3 ? '★' : '☆'}"></span>
                    <span th:text="${mediaValoracion >= 4 ? '★' : '☆'}"></span>
                    <span th:text="${mediaValoracion >= 5 ? '★' : '☆'}"></span>
                </div>
                <p style="margin: 0; color: #666;">
                    <strong th:text="${#numbers.formatDecimal(mediaValoracion, 1, 1)}">0.0</strong>
                    <span th:text="'(' + ${totalValoraciones} + ' valoraciones)'"></span>
                </p>
            </div>

            <div class="d-grid gap-3">

                <div th:if="${session.usuario_rol == 'admin'}"
                     style="background: #f8f9fa; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 15px;">
                    La cuenta de administrador no puede realizar compras.
                </div>

                <form th:if="${session.usuario_rol != 'admin'}" th:action="@{/carrito/add}" method="post">
                    <input type="hidden" name="id" th:value="${producto.id}">

                    <div th:if="${producto.tallas != null and !#strings.isEmpty(producto.tallas)}" style="margin-bottom: 15px;">
                        <label>Talla</label>
                        <select name="talla" required style="width: 100%;">
                            <option value="">Selecciona una talla</option>
                            <option th:each="talla : ${#strings.arraySplit(producto.tallas, ',')}"
                                    th:value="${#strings.trim(talla)}"
                                    th:text="${#strings.trim(talla)}"></option>
                        </select>
                    </div>

                    <div th:if="${producto.colores != null and !#strings.isEmpty(producto.colores)}" style="margin-bottom: 15px;">
                        <label>Color</label>
                        <select name="color" required style="width: 100%;">
                            <option value="">Selecciona un color</option>
                            <option th:each="color : ${#strings.arraySplit(producto.colores, ',')}"
                                    th:value="${#strings.trim(color)}"
                                    th:text="${#strings.trim(color)}"></option>
                        </select>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label>Cantidad</label>
                        <input type="number" name="cantidad" min="1" value="1" style="width: 100px;">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg px-5 w-100">
                        🛒 Añadir al carrito
                    </button>
                </form>

                <a href="/" class="btn btn-outline-secondary">Volver a la tienda</a>
            </div>
        </div>
    </div>

    <!-- 🔥 PRODUCTOS RELACIONADOS -->
    <div th:if="${not #lists.isEmpty(relacionados)}" style="margin-top: 60px;">
        <h3 style="margin-bottom: 25px; color: #2E7D32;">
            Productos de la misma categoría
        </h3>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">

            <div th:each="p : ${relacionados}" class="card" style="width: 220px;">

                <a th:href="@{/producto/{id}(id=${p.id})}" style="color: inherit;">

                    <img th:src="@{'/img/' + ${p.imagen}}"
                         class="card-img-top"
                         th:alt="${p.nombre}">

                    <div class="card-body">

                        <h5 th:text="${p.nombre}"
                            style="font-size: 1.1rem; margin-bottom: 10px;"></h5>

                        <p class="text-primary"
                           th:text="${#numbers.formatDecimal(p.precio, 1, 2) + ' €'}"></p>

                    </div>
                </a>

            </div>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
