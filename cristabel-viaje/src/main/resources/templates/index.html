<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cristabel de Viaje - Tienda</title>

  <th:block th:replace="~{fragments/head :: head}"></th:block>

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
  <h1 class="text-center mb-4">Nuestros Productos</h1>

  <div class="row" th:if="${productos != null and !productos.isEmpty()}">
    <div class="col-md-4 mb-4" th:each="producto : ${productos}">
      <div class="card h-100 shadow-sm">

        <img th:if="${producto.imagen != null}"
             th:src="@{'/img/' + ${producto.imagen}}"
             class="card-img-top"
             th:alt="${producto.nombre}">

        <img th:if="${producto.imagen == null}"
             src="https://via.placeholder.com/250"
             class="card-img-top"
             alt="Sin imagen">

        <div class="card-body text-center">
          <h5 class="card-title" th:text="${producto.nombre != null ? producto.nombre : 'Producto sin nombre'}">Nombre</h5>
          <div th:if="${medias[producto.id] > 0}"
               style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 5px;">

            <div style="color: #FFC107;">
              <span th:text="${medias[producto.id] >= 1 ? '★' : '☆'}"></span>
              <span th:text="${medias[producto.id] >= 2 ? '★' : '☆'}"></span>
              <span th:text="${medias[producto.id] >= 3 ? '★' : '☆'}"></span>
              <span th:text="${medias[producto.id] >= 4 ? '★' : '☆'}"></span>
              <span th:text="${medias[producto.id] >= 5 ? '★' : '☆'}"></span>
            </div>

            <small style="color: #666;">
              (<span th:text="${#numbers.formatDecimal(medias[producto.id], 1, 1)}">0.0</span>)
            </small>

          </div>
          <p class="fw-bold text-primary" th:text="${producto.precio != null ? producto.precio + ' €' : '0.00 €'}"></p>

          <div class="d-grid gap-2">

            <!-- Producto SIN variantes -->
            <a th:if="${(producto.tallas == null or #strings.isEmpty(producto.tallas)) and (producto.colores == null or #strings.isEmpty(producto.colores))}"
               th:href="@{'/producto/' + ${producto.id}}"
               class="btn btn-outline-secondary">
              Ver detalles
            </a>

            <form th:if="${(producto.tallas == null or #strings.isEmpty(producto.tallas)) and (producto.colores == null or #strings.isEmpty(producto.colores))}"
                  th:action="@{/carrito/add}" method="post" style="margin: 0;">
              <input type="hidden" name="id" th:value="${producto.id}">
              <button type="submit" class="btn btn-primary btn-lg w-100">
                🛒 Añadir al carrito
              </button>
            </form>

            <!-- Producto CON variantes -->
            <a th:if="${(producto.tallas != null and !#strings.isEmpty(producto.tallas)) or (producto.colores != null and !#strings.isEmpty(producto.colores))}"
               th:href="@{'/producto/' + ${producto.id}}"
               class="btn btn-primary btn-lg w-100">
              Ver producto
            </a>

          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${productos == null or productos.isEmpty()}" class="alert alert-info text-center">
    No hay productos disponibles actualmente.
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
