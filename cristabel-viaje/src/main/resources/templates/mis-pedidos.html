<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Pedidos - Tienda de Senderismo</title>

    <th:block th:replace="~{fragments/head :: head}"></th:block>

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="contenedor">
    <h1>Mis Pedidos</h1>

    <div th:if="${param.success}" style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        ¡Gracias por tu compra! Tu pedido ha sido procesado correctamente.
    </div>

    <div th:if="${#lists.isEmpty(pedidos)}">
        <p>Todavía no has realizado ningún pedido.</p>
        <a href="/" class="boton-detalle">Ir a la tienda</a>
    </div>

    <table th:if="${not #lists.isEmpty(pedidos)}" border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead style="background-color: #f4f4f4;">
        <tr>
            <th style="padding: 10px;">ID Pedido</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pedidos}" style="text-align: center;">
            <td style="padding: 10px;" th:text="${p.id}"></td>
            <td th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#numbers.formatDecimal(p.total, 1, 2) + ' €'}"></td>
            <td>
                        <span th:text="${p.estado}"
                              th:style="${p.estado == 'pendiente' ? 'color: orange; font-weight: bold;' : 'color: green;'}">
                        </span>
            </td>
        </tr>
        </tbody>
    </table>

    <p style="margin-top: 30px;">
        <a href="/" class="volver">← Volver a la tienda</a>
    </p>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
